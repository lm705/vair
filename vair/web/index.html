// ── Auto-connect panel ────────────────────────────────────────────
// autoLast caches the most recent auto_update SSE payload so the modal
// (and the toolbar button) can reflect supervisor activity even if the
// modal is opened after the event arrived.
var autoLast={};
// autoReasonTimer clears the transient "why we switched" sub-line a few seconds
// after a connect/switch, so it doesn't linger forever (e.g. when auto-switch
// is off and no later health event arrives to clear it).
var autoReasonTimer=null;
// autoCandsTimer debounces live candidate-list / status refreshes driven by SSE
// (conn_update, entry_update) while the panel is open.
var autoCandsTimer=null;

// autoPanelRefreshSoon re-renders the open Auto panel (status + candidate list)
// shortly after a relevant SSE event, so the panel stays live instead of only
// updating when reopened. No-op when the modal is closed.
function autoPanelRefreshSoon(){
  if(!document.getElementById('auto-modal')) return;
  if(autoCandsTimer) return;
  autoCandsTimer=setTimeout(function(){ autoCandsTimer=null; renderAutoStatus(); loadAutoCands(); }, 500);
}

// refreshAutoBtn toggles the toolbar button highlight from current settings.
function refreshAutoBtn(){
  var b=document.getElementById('btn-auto');
  if(!b) return;
  b.classList.toggle('on', !!appSettingsJS.auto_connect);
  if(!appSettingsJS.auto_connect) b.classList.remove('switching');
}

// onAutoUpdate handles auto_update SSE events from the supervisor.
function onAutoUpdate(p){
  p=p||{};
  // Every event fully replaces autoLast, so the reason is always whatever the
  // LATEST event reported — a new switch (for any reason) supersedes the prior
  // one, never showing a stale "manual switch" after a later auto-switch.
  autoLast=p;
  var b=document.getElementById('btn-auto');
  if(b){
    b.classList.toggle('on', !!autoLast.enabled);
    b.classList.toggle('switching', autoLast.state==='switching');
  }
  // The reason ("why we switched") is transient: auto-clear it a few seconds
  // after a connect so it doesn't linger (esp. with auto-switch off, where no
  // later health event would clear it). Reset on every event so the timer
  // always tracks the most recent reason, not the first one shown.
  if(autoReasonTimer){ clearTimeout(autoReasonTimer); autoReasonTimer=null; }
  if(autoLast.reason && autoLast.state==='connected'){
    var shownRaw=autoLast.current_raw;
    autoReasonTimer=setTimeout(function(){
      // Only clear if we're still showing the same config's reason (a newer
      // event for another config would have already replaced it).
      if(autoLast && autoLast.current_raw===shownRaw){ autoLast.reason=''; renderAutoStatus(); }
    }, 8000);
  }
  renderAutoStatus();
  // A switch/connect changed which config is current — refresh the list.
  if(autoLast.state==='switching'||autoLast.state==='connected'||autoLast.state==='all_down') loadAutoCands();
}

// autoReasonText maps a server-side reason code to a localized phrase.
function autoReasonText(r){
  if(!r) return '';
  // No ms here on purpose: the main status line already shows the NEW config's
  // live ping ("· NNN ms"). Embedding the OLD config's latency too read as if the
  // panel were showing the previous slow config's ping.
  if(r.indexOf('too slow')===0) return t('previous config too slow');
  if(r==='probe failed') return t('previous config stopped responding');
  if(r==='slow but best') return t('slow, but the fastest available');
  if(r==='manual switch') return t('manual switch');
  if(r==='tabs changed') return t('candidate tabs changed');
  if(r==='auto-connect') return t('auto-connected');
  return r;
}

// renderAutoStatus paints the live status block inside the Auto modal.
function renderAutoStatus(){
  var el=document.getElementById('auto-status');
  if(!el) return;
  var enabled=!!appSettingsJS.auto_connect;
  var cls='', txt='', sub='';
  if(!enabled){
    txt=t('Auto-connect is off');
  } else if(connState && connState.status==='connected'){
    // Live connection wins over the cached auto_update — otherwise a stale
    // "connected" payload keeps showing the old config after a manual
    // disconnect.
    cls='ok';
    // The live connection is authoritative: a manual connect to another
    // config updates connState immediately, while autoLast still holds the
    // config the supervisor last reported — so prefer connState.entry_name.
    var nm=(connState.entry_name)||(autoLast.current_name)||'';
    // The supervisor's rtt/reason describe the config IT last reported. If the
    // live connection is a different config now (a manual connect, or a switch
    // for a newer reason already superseded), they're stale — show them only
    // when autoLast still matches the live connection.
    var sameCfg=!!(autoLast.current_raw && connState.conn_raw && autoLast.current_raw===connState.conn_raw);
    var rtt=(sameCfg && autoLast.rtt_ms>0)?(' · '+autoLast.rtt_ms+' ms'):'';
    txt=t('Connected')+(nm?': '+x(nm):'')+rtt;
    if(sameCfg && autoLast.reason) sub=autoReasonText(autoLast.reason);
  } else {
    var st=autoLast.state||'';
    if(st==='switching'){ cls='warn'; var sn=autoLast.current_name||''; txt=t('Switching…')+(sn?' → '+x(sn):''); }
    else if(st==='all_down'){ cls='down'; txt=t('All candidates are down'); }
    else if(st==='paused'){ txt=t('Paused — reconnect to resume'); }
    else { txt=t('Idle — waiting'); }
  }
  el.className='auto-status'+(cls?' '+cls:'');
  el.innerHTML='<span class="as-dot"></span>'+txt+
    (sub?'<div style="margin-top:3px;font-size:.85em;opacity:.7">↻ '+x(sub)+'</div>':'');
}

// loadAutoCands fetches and renders the ranked candidate list (panel only).
function loadAutoCands(){
  var box=document.getElementById('auto-cands');
  if(!box) return; // modal not open
  fetch('/api/auto/candidates').then(function(r){return r.json();}).then(function(list){
    var box2=document.getElementById('auto-cands');
    if(!box2) return;
    if(!list||!list.length){ box2.innerHTML='<div class="modal-hint" style="margin:0">'+t('No eligible candidates yet — run ping on the candidate tabs.')+'</div>'; return; }
    var bySpeed=!!appSettingsJS.auto_rank_by_speed;
    var h='';
    for(var i=0;i<list.length;i++){
      var c=list[i];
      var metric;
      // Always surface ping when we have it, so the list shows real delay even
      // in prefer-faster mode (speed leads, ping follows). Untested/failed have
      // no ping to show.
      var ms=(c.status==='ok' && c.delay>0) ? c.delay+' ms' : '';
      if(c.status==='failed') metric=t('failed');
      else if(bySpeed && c.speed_mbps>0) metric=c.speed_mbps.toFixed(1)+' MB/s'+(ms?' · '+ms:'');
      else if(ms) metric=ms;
      else metric=t('untested');
      h+='<div class="auto-cand'+(c.current?' current':'')+'" data-raw="'+x(c.raw||'')+'" onclick="autoConnectCand(this.getAttribute(\'data-raw\'))" title="'+t('Click to connect to this config')+'">'+
        '<span class="ac-rank">'+(i+1)+'</span>'+
        '<span class="ac-name">'+x(c.name||'')+(c.current?' <b>•</b>':'')+'</span>'+
        '<span class="ac-metric">'+x(metric)+'</span></div>';
    }
    box2.innerHTML=h;
  }).catch(function(){});
}

// ── AUTO window Logs section ──────────────────────────────────────────────
// A second collapsible block under Settings, mirroring the main Logs dock but
// living inside the AUTO panel (so the detached/standalone window has logs too).
// Collapsed by default; the source filter defaults to "vair". It reuses the
// shared logBuf + logLineHTML; only the view element and selectors are its own.
var autoLogsExpanded=false;
// selectionInEl: true when there's a live (non-collapsed) text selection inside
// the given element — so a live log batch doesn't wipe a copy-in-progress.
function selectionInEl(el){
  if(!el) return false;
  var sel=window.getSelection&&window.getSelection();
  if(!sel || sel.rangeCount===0 || sel.isCollapsed) return false;
  return el.contains(sel.anchorNode);
}
// renderAutoLogs rebuilds the AUTO log view from the buffer (open + filter change).
function renderAutoLogs(){
  var view=document.getElementById('auto-log-view');
  if(!view) return;
  var html='';
  for(var i=0;i<logBuf.length;i++){ if(logPassesFilterFor(logBuf[i],'auto-log-src','auto-log-lvl')) html+=logLineHTML(logBuf[i]); }
  view.innerHTML=html || '<div class="log-empty">No logs yet — connect to a config to see core output.</div>';
  var auto=document.getElementById('auto-log-autoscroll');
  if(!auto || auto.checked) view.scrollTop=view.scrollHeight;
}
// appendAutoLogs adds just the new batch to the AUTO log view (called from
// onLogBatch). No-op unless the section is open and present.
function appendAutoLogs(arr){
  if(!autoLogsExpanded) return;
  var view=document.getElementById('auto-log-view');
  if(!view || selectionInEl(view)) return;
  var auto=document.getElementById('auto-log-autoscroll');
  var atBottom=view.scrollHeight-view.scrollTop-view.clientHeight < 40;
  var html='';
  for(var j=0;j<arr.length;j++){ if(logPassesFilterFor(arr[j],'auto-log-src','auto-log-lvl')) html+=logLineHTML(arr[j]); }
  if(html){
    view.insertAdjacentHTML('beforeend', html);
    while(view.childElementCount>LOG_CAP) view.removeChild(view.firstChild);
  }
  if((!auto || auto.checked) && atBottom) view.scrollTop=view.scrollHeight;
}
function toggleAutoLogs(){
  autoLogsExpanded=!autoLogsExpanded;
  var head=document.getElementById('auto-logs-toggle');
  var body=document.getElementById('auto-logs-body');
  if(head) head.classList.toggle('collapsed',!autoLogsExpanded);
  if(body) body.classList.toggle('collapsed',!autoLogsExpanded);
  if(autoLogsExpanded){
    // Refill from the server so lines emitted while collapsed aren't missed.
    fetch('/api/logs').then(function(r){return r.json();}).then(function(arr){
      if(Array.isArray(arr)) logBuf=arr.slice(-LOG_CAP);
      renderAutoLogs();
    }).catch(function(){ renderAutoLogs(); });
  }
  if(autoStandalone) resizeWindowToAutoPanel();
}
function copyAutoLogs(){
  var lines=[];
  for(var i=0;i<logBuf.length;i++){
    var l=logBuf[i];
    if(!logPassesFilterFor(l,'auto-log-src','auto-log-lvl')) continue;
    lines.push(fmtLogTime(l.t)+' ['+logSrcLabel(l.src||'vair')+'] '+(l.msg||''));
  }
  navigator.clipboard.writeText(lines.join('\n')).catch(function(){});
}
function clearAutoLogs(){
  logBuf=[];
  renderAutoLogs();
  if(typeof renderLogs==='function') renderLogs();
  fetch('/api/logs/clear',{method:'POST'}).catch(function(){});
}

// closeAuto closes the AUTO panel. If it was standalone, leave standalone view
// and restore the window size so the main app is visible again at full size.
function closeAuto(){
  if(autoStandalone && typeof _goRestoreFromDetach==='function') _goRestoreFromDetach();
  document.body.classList.remove('auto-standalone');
  autoStandalone=false;
  var m=document.getElementById('auto-modal'); if(m) m.remove();
}

// autoStandalone: when true, the AUTO panel is the whole window — the rest of
// the app (header, tabs, table, conn-bar, logs) is hidden via body.auto-standalone,
// and the overlay drops its dim backdrop so the panel reads as the window body.
// The OS window itself (move / minimize / maximize / close-to-tray) is unchanged
// — this is purely a view toggle. The frameless title-bar drag still works.
var autoStandalone=false;
function toggleAutoStandalone(){
  autoStandalone=!autoStandalone;
  document.body.classList.toggle('auto-standalone', autoStandalone);
  if(autoStandalone){
    // Make sure the panel is open, then resize the OS window to fit it 1:1.
    if(!document.getElementById('auto-modal')) openAuto();
    resizeWindowToAutoPanel();
  } else if(typeof _goRestoreFromDetach==='function'){
    // Back to app: restore the window to its pre-detach size/position.
    _goRestoreFromDetach();
  }
}
// resizeWindowToAutoPanel measures the AUTO panel + title bar and asks the Go
// side to size the OS window to match it 1:1 with the normal AUTO modal: the
// panel's natural width (560) and its natural height, but capped at ~85% of the
// work area (like the modal's max-height:85vh) so a long config list scrolls
// inside the window rather than forcing a full-screen-tall window. Run after a
// frame so the standalone flex layout settles before we measure.
function resizeWindowToAutoPanel(){
  if(typeof _goDetachResize!=='function') return;
  requestAnimationFrame(function(){
    var box=document.querySelector('#auto-modal .modal-box');
    if(!box) return;
    var tb=document.getElementById('titlebar');
    var tbH=(tb && tb.classList.contains('active'))?tb.offsetHeight:0;
    // Pass the panel's NATURAL size. The Go side (_goDetachResize) clamps the
    // height to the user's window-size-% setting and centers on the current
    // monitor, so the window grows when the settings are expanded but never past
    // pct% of the screen — and the panel scrolls internally beyond that. With no
    // overlay padding in standalone, width = panel width exactly (the scrollbar,
    // if any, sits inside the panel). scrollHeight is the full content height even
    // when collapsed/clipped, so collapsing the settings shrinks the window.
    var contentH=box.scrollHeight;
    if(contentH<160) contentH=160;
    var boxW=Math.ceil(box.getBoundingClientRect().width); // 560 (border-box)
    _goDetachResize(boxW, contentH+tbH, window.devicePixelRatio||1);
  });
}

    '<div class="modal-title">'+t('Running processes')+'</div>'+
    '<input class="modal-input" id="proc-filter" placeholder="'+t('filter…')+'" autofocus>'+
    '<div class="modal-hint" style="margin-top:0">'+t('Click a process to add it to the Apps without VPN list.')+'</div>'+
    '<div id="proc-list-box" style="max-height:300px;overflow-y:auto;border:1px solid var(--border2);border-radius:3px;background:var(--bg2);padding:4px"></div>'+
    '<div class="modal-btns">'+
      '<button class="btn ghost" onclick="refreshProcessCache();renderProcessList(document.getElementById(\'proc-filter\').value)">'+t('refresh')+'</button>'+
      '<button class="btn ghost" onclick="document.getElementById(\'proc-modal\').remove()">'+t('close')+'</button>'+
    '</div>'+
  '</div>';

  });

function renderProcessList(filter){
  var box=document.getElementById('proc-list-box');
  if(!box) return;
  filter=(filter||'').trim().toLowerCase();
  var existing=new Set((appSettingsJS.direct_apps||[]).map(function(s){return s.toLowerCase();}));
  var names=processNamesCache;
  var html='';
  var shown=0;
  for(var i=0;i<names.length;i++){
    var n=names[i];
    if(filter && n.indexOf(filter)<0) continue;
    var already=existing.has(n);
    html+='<div class="proc-item'+(already?' added':'')+'" onclick="addProcessFromPicker(\''+
      x(n).replace(/\\/g,'\\\\').replace(/\x27/g,'\\\x27')+'\')" '+
      'style="padding:5px 8px;cursor:pointer;font-size:11px;border-radius:2px;'+
      (already?'opacity:.5;':'')+'" '+
      'onmouseover="this.style.background=\'rgba(232,197,71,.12)\'" '+
      'onmouseout="this.style.background=\'\'">'+
      x(n)+(already?'  ('+t('already added')+')':'')+
      '</div>';
    shown++;
    if(shown>500){ html+='<div style="padding:4px 8px;color:var(--dim);font-size:10px">… '+(names.length-shown)+' '+t('more, refine filter')+'</div>'; break; }
  }
  if(shown===0){
    html='<div style="padding:8px;color:var(--dim);font-size:11px;text-align:center">'+
      (names.length===0?t('No process list available — only works in the desktop build.'):t('No matches'))+
      '</div>';
  }
  box.innerHTML=html;
}

function addProcessFromPicker(name){
  if(!name) return;
  if(!appSettingsJS.direct_apps) appSettingsJS.direct_apps=[];
  var lower=name.toLowerCase();
  for(var i=0;i<appSettingsJS.direct_apps.length;i++){
    if(appSettingsJS.direct_apps[i].toLowerCase()===lower) return; // already there
  }
  appSettingsJS.direct_apps.push(lower);
  saveAppSettings(function(){
    // Re-render the chip strip in the underlying Settings modal.
    var wrap=document.getElementById('app-chips');
    var inp=document.getElementById('app-input');
    if(wrap && inp){
      wrap.querySelectorAll('.chip').forEach(function(c){c.remove();});
      for(var i=0;i<appSettingsJS.direct_apps.length;i++){
        var sp=document.createElement('span');
        sp.className='chip';sp.setAttribute('data-a',appSettingsJS.direct_apps[i]);
        sp.innerHTML=x(appSettingsJS.direct_apps[i])+'<span class="chip-x" onclick="removeAppChip(this)">x</span>';
        wrap.insertBefore(sp,inp);
      }
    }
    // Refresh the picker list so the just-added entry shows as "already added".
    var f=document.getElementById('proc-filter');
    if(f) renderProcessList(f.value);
  });
}

// ── Self-update ─────────────────────────────────────────────────────────────
function checkUpdate(){
  var msg=document.getElementById('upd-msg');
  var btn=document.getElementById('upd-check');
  var applyRow=document.getElementById('upd-apply-row');
  if(msg) msg.textContent=t('Checking…');
  if(btn) btn.disabled=true;
  fetch('/api/update/check').then(function(r){return r.json();}).then(function(j){
    if(btn) btn.disabled=false;
    var vr=document.getElementById('upd-version'); if(vr&&j.current) vr.innerHTML='Vair <b>'+x(j.current)+'</b>';
    if(j.error){ if(msg) msg.textContent=t('Could not check for updates')+': '+x(j.error); return; }
    if(j.available){
      if(msg) msg.innerHTML=t('Update available')+': <b>'+x(j.latest)+'</b>'+(j.notes?(' — '+x(j.notes)):'');
      if(applyRow){
        applyRow.style.display='';
        var lt=document.getElementById('upd-latest'); if(lt) lt.textContent=t('New version')+': '+j.latest;
      }
    } else {
      if(msg) msg.textContent=t('You have the latest version.');
      if(applyRow) applyRow.style.display='none';
    }
  }).catch(function(){ if(btn) btn.disabled=false; if(msg) msg.textContent=t('Could not check for updates'); });
}
function applyUpdate(){
  if(!confirm(t('Download and install the update now? Vair will restart.'))) return;
  var ab=document.getElementById('upd-apply'); if(ab) ab.disabled=true;
  fetch('/api/update/apply',{method:'POST'}).catch(console.error);
}
// openExtURL opens a link in the user's default browser via the native binding
// (the WebView itself must never navigate away from the app).
function openExtURL(url){
  if(typeof _goOpenURL==='function') _goOpenURL(url);
  else { try{ window.open(url,'_blank'); }catch(e){} }
}
// onUpdateStatus renders the live progress of an in-flight update (SSE).
function onUpdateStatus(p){
  if(!p) return;
  var msg=document.getElementById('upd-msg');
  var wrap=document.getElementById('upd-progress-wrap');
  var fill=document.getElementById('upd-fill');
  var btn=document.getElementById('upd-check');
  if(!msg) return; // Settings closed — nothing to render
  switch(p.state){
    case 'checking':    msg.textContent=t('Checking…'); break;
    case 'downloading':
      if(wrap) wrap.style.display='';
      if(fill) fill.style.width=(p.pct||0)+'%';
      msg.textContent=t('Downloading update')+' '+(p.msg||'')+' — '+(p.pct||0)+'%';
      break;
    case 'verifying':   msg.textContent=t('Verifying…'); break;
    case 'ready':       msg.textContent=t('Update ready — restarting…'); break;
    case 'uptodate':    if(wrap) wrap.style.display='none'; msg.textContent=t('You have the latest version.'); if(btn) btn.disabled=false; break;
    case 'error':       if(wrap) wrap.style.display='none'; msg.textContent=t('Update failed')+': '+(p.msg||''); if(btn) btn.disabled=false; break;
  }
}

// exportSettings asks the server for the JSON document, then lets the user
// pick where to save it via a native Save As dialog. The browser-download
// path (anchor with the download attribute) is only a fallback when the
// native binding is unavailable — in WebView2 it would usually drop the
// file in the user's Downloads folder with no chance to choose.
function exportSettings(){
  fetch('/api/export').then(function(r){
    if(!r.ok) throw new Error('export failed: '+r.status);
    return r.text();
  }).then(function(text){
    // Build a timestamped suggested name; the user can change it in the dialog.
    function pad2(n){return (n<10?'0':'')+n;}
    var d=new Date();
    var stamp=d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate())+'_'+pad2(d.getHours())+pad2(d.getMinutes())+pad2(d.getSeconds());
    var name='vair_settings_'+stamp+'.json';
    if(typeof window._goSaveExport==='function'){
      return Promise.resolve(window._goSaveExport(name, text)).then(function(path){
        // Empty path == user cancelled. Nothing to do; no notification noise.
        return path;
      });
    }
    // Fallback: trigger a plain browser download.
    var blob=new Blob([text],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download=name;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ a.remove(); URL.revokeObjectURL(url); }, 0);
  }).catch(function(err){ alert('Export failed: '+err); });
}

// importSettings opens the hidden <input type="file">; the change handler
// (handleImportFile) reads the picked file and POSTs it to /api/import.

function handleImportFile(ev){
  var f=ev.target.files && ev.target.files[0];
  if(!f) return;
  // Read the toggle BEFORE the confirm dialog so a dynamic-language remount
  // can't drop the element between us and the fetch.
  var tabsBox=document.getElementById('set-import-tabs');
  var includeTabs=tabsBox?tabsBox.checked:true;
  var msg=includeTabs
    ? t('Replace current tabs and settings with the imported file? This cannot be undone.')
    : t('Replace current app settings with the imported file? Tabs will not be touched.');
  if(!confirm(msg)){
    return;
  }
  var reader=new FileReader();
  reader.onload=function(){
    fetch('/api/import?tabs='+(includeTabs?'1':'0'),{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: reader.result
    }).then(function(r){
      if(!r.ok){
        r.text().then(function(t){ alert('Import failed: '+t); });
        return;
      }
      // Server has rebroadcast tabs/active_tab/loaded over SSE; force a
      // full re-render via reload to make sure every cached bit of UI
      // state (selectedRows, sortMode, modals) starts clean.
      location.reload();
    }).catch(function(err){ alert('Import failed: '+err); });
  };
  reader.onerror=function(){ alert('Could not read file'); };
  reader.readAsText(f);
}

// updateConcurrency stores a clamped concurrency choice in app settings.
// Server clamps again on receive (defensive), but we mirror the bounds here
// so the visible input value stays sensible if the user types past them.
function updateConcurrency(kind, raw){
  if(kind==='ping') appSettingsJS.ping_concurrency=clampNumSetting(raw,1,200,10,'set-ping-conc');
  else appSettingsJS.speed_concurrency=clampNumSetting(raw,1,100,5,'set-speed-conc');
  saveAppSettings();
}

// clampNumSetting parses a numeric settings field. A BLANK or non-numeric value
// restores the DEFAULT (so clearing a field reverts it to its default, not to
// the minimum — the old behaviour); a valid value is clamped to [min,max]. The
// resolved value is written back into the input (id) so the field visibly snaps
// to it. Server-side accessors still re-validate, so this is purely UX.
function clampNumSetting(raw,min,max,def,id){
  raw=(raw==null?'':String(raw)).trim();
  var v;
  if(raw==='') v=def;
  else { v=parseInt(raw,10); if(isNaN(v)) v=def; else if(v<min) v=min; else if(v>max) v=max; }
  if(id){ var inp=document.getElementById(id); if(inp) inp.value=v; }
  return v;
}
// updatePingTimeout / updateSpeedDuration store the test-duration knobs.
// Bounds mirror minPingTimeoutMs / maxPingTimeoutMs / minSpeedDurationSec /
// maxSpeedDurationSec on the Go side; out-of-range values fall back to the
// compile-time defaults (1500 ms ping, 4 s speed) at measurement time.
function updatePingTimeout(raw){
  appSettingsJS.ping_timeout_ms=clampNumSetting(raw,200,10000,1500,'set-ping-timeout');
  saveAppSettings();
}
// updateWarmupTimeout stores the warm-up request timeout. Bounds mirror
// minWarmupTimeoutMs / maxWarmupTimeoutMs on the Go side; out-of-range falls
// back to the compile-time default (4000 ms) at measurement time.
function updateWarmupTimeout(raw){
  appSettingsJS.warmup_timeout_ms=clampNumSetting(raw,200,20000,4000,'set-warmup-timeout');
  saveAppSettings();
}
function updateSpeedDuration(raw){
  appSettingsJS.speed_duration_sec=clampNumSetting(raw,1,60,4,'set-speed-duration');
  saveAppSettings();
}

// updateModalFontSize / updateLanguage — Appearance controls. Both apply
// only to .modal-* DOM (Settings + Tab settings); the main window keeps
// its original typography and English labels by design. Bounds match
// applyUIPrefs: 9–20 px, default 11. Out-of-range values fall back to
// the default at apply time.
function updateModalFontSize(raw){
  appSettingsJS.modal_font_size=clampNumSetting(raw,9,20,11,'set-modal-fs');
  applyUIPrefs();
  saveAppSettings();
}
// updateTheme switches between dark and light palettes, applies immediately and
// persists. "dark" is stored as the default; only "light" is a real override.
function updateTheme(v){
  appSettingsJS.theme = (v==='light') ? 'light' : 'dark';
  applyTheme();

}
// updateWindowSize persists the default-window-size percent and, on the native
// Windows build, re-applies it to the current monitor immediately (no-op while
// maximized). On launch the Go side reads the saved value.
function updateWindowSize(raw){
  appSettingsJS.window_size_pct=clampNumSetting(raw,40,100,80,'set-win-size');
  saveAppSettings(function(){

// SPEED_PRESETS[0].url is intentionally empty for the *primary* dropdown
// (empty value tells the Go side "use the built-in default"). For the

// literal default URL spelled out when listing/matching that preset there.

// isCustomURL: true when the user's current URL doesn't match any

function isCustomURL(kind){

// updateTestURL handles a dropdown change. Selecting a preset writes
// its URL straight into settings (the empty string for the default is
// fine — currentPingURL()/currentSpeedURL() on the Go side falls back
// to the built-in default for empty). "__custom" reveals the text
// input but doesn't change the saved URL until the user types and
// blurs (updateTestURLCustom does the save).
function updateTestURL(kind, val){
  var customRow = document.getElementById(kind+'-url-custom-row');
  if(val==='__custom'){
    if(customRow) customRow.style.display='block';

    // But seed the input with whatever they had (if it was already custom).

// fallbackPresetURL returns the URL value for a SPEED_PRESETS entry as
// used in the *fallback* dropdown: the first preset (which has an empty
// URL in the primary list, meaning "use server default") gets remapped to
// the literal SPEED_DEFAULT_URL so it can actually be selected as a
// fallback.
function fallbackPresetURL(p){
  return p.url || SPEED_DEFAULT_URL;
}
// fallbackPresetLabel strips the "(default)" suffix when present. That
// suffix exists in the primary dropdown to signal "leave empty → use this
// URL", but in the fallback context it's just confusing — every option is
// a real URL the user can pick, no defaulting involved.
function fallbackPresetLabel(p){
  return (p.label||'').replace(/\s*\(default\)\s*$/,'');
}
// isCustomFallback: true when the saved fallback URL is set but doesn't
// match any SPEED_PRESETS entry — the dropdown should show "Custom URL…"
// selected and reveal the text input. Empty string means "None", not custom.
function isCustomFallback(){
  var cur = appSettingsJS.speed_test_url_fallback||'';
  if(cur==='' || cur==='__none') return false; // default (CacheFly) or disabled — not custom
  for(var i=0;i<SPEED_PRESETS.length;i++){
    if(fallbackPresetURL(SPEED_PRESETS[i])===cur) return false;
  }
  return true;
}
// speedFallbackOptions reuses SPEED_PRESETS but prepends an explicit
// "None" option (the default — fallback disabled). The first preset's
// empty URL is remapped to the actual Cloudflare default so the user can
// pick it as a fallback target (the label keeps "(default)" — that hints
// it's the same endpoint the primary slot falls back to when left blank).
function speedFallbackOptions(){
  var cur = appSettingsJS.speed_test_url_fallback||'';
  // Empty / unset = the default (CacheFly is on by default). Only the explicit
  // "__none" sentinel means the fallback is disabled.
  if(cur==='') cur='http://cachefly.cachefly.net/100mb.test';
  var isNone = (cur === '__none');
  var custom = isCustomFallback();
  var html='';
  html += '<option value="__none"'+(isNone?' selected':'')+'>'+t('None — no fallback')+'</option>';
  for(var i=0;i<SPEED_PRESETS.length;i++){
    var p = SPEED_PRESETS[i];
    var url = fallbackPresetURL(p);
    var sel = (!isNone && !custom && url===cur) ? ' selected' : '';
    var lbl = fallbackPresetLabel(p);
    // CacheFly is the built-in fallback default — mark it so in the list.
    if(url==='http://cachefly.cachefly.net/100mb.test') lbl += ' (default)';
    html += '<option value="'+x(url)+'"'+sel+'>'+x(lbl)+'</option>';
  }
  html += '<option value="__custom"'+(custom?' selected':'')+'>Custom URL…</option>';
  return html;
}
// updateSpeedFallback handles a dropdown change. "__none" clears the saved
// URL (fallback disabled); "__custom" reveals the text input but doesn't
// save until the user types and blurs; a preset saves its URL straight in.

// updateMTU clamps to [576, 9000] (the same clamp Go applies). Empty

// socksRandHex returns n hex chars of (preferably crypto-strong) randomness for
// the local SOCKS proxy credentials.
function socksRandHex(n){
  try{
    var a=new Uint8Array(Math.ceil(n/2));
    (window.crypto||window.msCrypto).getRandomValues(a);
    return Array.prototype.map.call(a,function(b){return ('0'+b.toString(16)).slice(-2);}).join('').slice(0,n);
  }catch(e){
    var s='',c='0123456789abcdef';
    for(var i=0;i<n;i++) s+=c[Math.floor(Math.random()*16)];
    return s;
  }
}
// ensureSocksCreds fills in random credentials if they're missing.
function ensureSocksCreds(){
  if(!appSettingsJS.socks_user) appSettingsJS.socks_user=socksRandHex(16);
  if(!appSettingsJS.socks_pass) appSettingsJS.socks_pass=socksRandHex(32);
}
function applySocksCredsToInputs(){
  var u=document.getElementById('set-socks-user'); if(u) u.value=appSettingsJS.socks_user||'';
  var p=document.getElementById('set-socks-pass'); if(p) p.value=appSettingsJS.socks_pass||'';
}

  applySocksCredsToInputs();

// Static hosts: stored as object {domain: ip}, edited in a textarea
// as one-per-line "domain ip" pairs (mirrors /etc/hosts ordering).
// Lines starting with # are comments. Whitespace around domain or
// IP is tolerated. Invalid lines are dropped silently on save —
// the parser is forgiving rather than yelling at the user.
function staticHostsToText(obj){
  if(!obj || typeof obj !== 'object') return '';
  var lines = [];
  Object.keys(obj).sort().forEach(function(k){
    lines.push(k + ' ' + obj[k]);
  });
  return lines.join('\n');
}
function updateStaticHosts(raw){
  var out = {};
  (raw||'').split(/\r?\n/).forEach(function(line){
    var t = line.trim();
    if(!t || t[0] === '#') return;
    var parts = t.split(/\s+/);
    if(parts.length < 2) return;
    var domain = parts[0].toLowerCase();
    var ip = parts[1];
    // Very loose validation — anything Go can parse counts as an IP
    // there, so we just reject obviously empty/whitespace values.
    if(domain && ip) out[domain] = ip;
  });
  appSettingsJS.static_hosts = out;
  saveAppSettings();
}



// ── chip-list helpers (shared by domains / proxy-domains / apps / exclude) ──
// splitPasted breaks a pasted blob into entries on newlines, commas, semicolons
// and tabs — the separators produced by the "copy as column" feature — but NOT
// spaces (so paths like "C:\Program Files\app.exe" survive). One token → empty
// so a single-value paste falls through to native editing.
function splitPasted(text){
  return (text||'').split(/[\r\n,;\t]+/).map(function(s){return s.trim();}).filter(Boolean);
}
function normDomain(v){ return (v||'').trim().toLowerCase().replace(/^https?:\/\//,'').replace(/\/.*$/,''); }
function normApp(v){
  var leaf=(v||'').trim().replace(/[\/\\]+$/,'');
  var sep=Math.max(leaf.lastIndexOf('\\'), leaf.lastIndexOf('/'));
  if(sep>=0) leaf=leaf.substring(sep+1);
  return leaf.toLowerCase();
}
// chipPasteList handles a paste into an array-backed chip input: split, add each
// (addFn returns true when it actually added), then save + re-render once. A
// single-token paste is left to the native handler so the user can edit it.
function chipPasteList(ev, addFn, renderFn){
  var cd=ev.clipboardData||window.clipboardData;
  var toks=splitPasted(cd?cd.getData('text'):'');
  if(toks.length<2) return;
  ev.preventDefault();
  var any=false;
  for(var i=0;i<toks.length;i++){ if(addFn(toks[i])) any=true; }
  ev.target.value='';
  if(any) saveAppSettings(renderFn);
}

function addDirectDomainValue(v){

  appSettingsJS.direct_domains.push(v); return true;
}

// modalFiles holds the set of files (existing + newly added) for the
// currently open tab settings modal. Each item has {name, content, isNew}.
// We populate it from tab.source_files on open, mutate as the user adds /
// removes, then send it back on save.
var modalFiles=[];

// fmtBytes formats a byte count for both file sizes (used by the
// per-tab file picker) and traffic totals (used by the header stats
// panel and Settings). Lifetime totals routinely climb into GB/TB
// territory, so the scale runs all the way up. Compact precision
// (≤2 decimals) keeps the column width predictable as values grow.
function fmtBytes(n){
  if(!n||n<0) return '0 B';
  if(n<1024) return n+' B';
  const units=['KB','MB','GB','TB'];
  let v=n/1024, i=0;
  while(v >= 1024 && i < units.length-1){ v/=1024; i++; }
  const s = v >= 100 ? v.toFixed(0) : (v >= 10 ? v.toFixed(1) : v.toFixed(2));
  return s+' '+units[i];
}

// ── Subscription info (Feature: parsed from sub headers / #-comments) ────────
function fmtDateDM(unixSec){
  var d=new Date(unixSec*1000);
  function p(n){return (n<10?'0':'')+n;}
  return p(d.getDate())+'.'+p(d.getMonth()+1)+'.'+d.getFullYear();
}
function subDaysLeft(unixSec){ return Math.ceil((unixSec*1000 - Date.now())/86400000); }
// subLabel names a subscription for display: its title, else the host of its
// source URL, else a generic fallback.
function subLabel(sub){
  if(sub.title) return sub.title;
  if(sub.url){ try{ return new URL(sub.url).hostname; }catch(e){} }
  return t('Subscription');
}
// subHasInfo reports whether a sub record is worth a block (any source with a
// URL shows — so you can see which link loaded and which failed).
function subHasInfo(s){ return !!(s && (s.url||s.title||s.total>0||s.expire>0||s.count>0||s.updated||s.update_interval||s.error||(s.notes&&s.notes.length))); }
// subRows renders the detailed rows for ONE subscription (settings modal),
// including the source URL it came from and a load error if the fetch failed.
function subRows(sub){
  var rows='';
  if(sub.title) rows+='<div class="si-row"><b>'+x(sub.title)+'</b></div>';
  if(sub.url) rows+='<div class="si-row si-dim si-url" title="'+x(sub.url)+'">'+x(sub.url)+'</div>';
  if(sub.error){
    return rows+'<div class="si-row si-warn">'+t('Failed to load')+': '+x(t(sub.error))+'</div>';
  }
  if(sub.total>0){
    var used=(sub.upload||0)+(sub.download||0);
    var pct=Math.min(100,Math.round(used/sub.total*100));
    rows+='<div class="si-row">'+t('Traffic')+': '+x(fmtBytes(used))+' / '+x(fmtBytes(sub.total))+' ('+Math.max(0,100-pct)+'% '+t('left')+')'+
      '<div class="si-bar"><div class="si-fill" style="width:'+pct+'%"></div></div></div>';
  }
  if(sub.expire>0){
    var dl=subDaysLeft(sub.expire);
    rows+='<div class="si-row'+(dl<=7?' si-warn':'')+'">'+t('Expires')+': '+fmtDateDM(sub.expire)+' ('+dl+' '+t('days')+')</div>';
  }
  if(sub.count>0) rows+='<div class="si-row si-dim">'+t('Configs')+': '+sub.count+'</div>';
  if(sub.updated) rows+='<div class="si-row si-dim">'+t('Updated')+': '+x(sub.updated)+'</div>';
  if(sub.update_interval) rows+='<div class="si-row si-dim">'+t('Update interval')+': '+x(sub.update_interval)+'</div>';
  if(sub.notes&&sub.notes.length){
    for(var k=0;k<sub.notes.length;k++) rows+='<div class="si-row si-dim si-note">'+x(sub.notes[k])+'</div>';
  }
  return rows;
}
// subInfoHtml renders the read-only block for the settings modals — one
// sub-block per subscription (a tab can have several source URLs).
function subInfoHtml(subs){
  if(!subs||!subs.length) return '';
  var blocks='';
  for(var i=0;i<subs.length;i++){
    if(!subHasInfo(subs[i])) continue;
    blocks+='<div class="si-block'+(blocks?' si-sep':'')+'">'+subRows(subs[i])+'</div>';
  }
  if(!blocks) return '';
  var n=subs.filter(subHasInfo).length;
  return '<div class="settings-section"><div class="section-header">'+t('Subscription info')+(n>1?' ('+n+')':'')+'</div>'+blocks+'</div>';
}
// subBarSegment renders one subscription compactly for the bar above the table.
function subBarSegment(sub){
  var parts=['<span class="sb-title">'+x(subLabel(sub))+'</span>'];
  if(sub.total>0){
    var used=(sub.upload||0)+(sub.download||0);
    var pct=Math.min(100,Math.round(used/sub.total*100));
    parts.push('<span>'+x(fmtBytes(used))+' / '+x(fmtBytes(sub.total))+'</span>'+
      '<span class="sb-bar"><span class="sb-fill" style="width:'+pct+'%"></span></span>');
  }
  if(sub.expire>0){
    var dl=subDaysLeft(sub.expire);
    parts.push('<span'+(dl<=7?' class="sb-warn"':'')+'>'+t('until')+' '+fmtDateDM(sub.expire)+' ('+dl+' '+t('days')+')</span>');
  }
  return parts.join('<span style="opacity:.4">·</span>');
}
// updateSubBar fills the compact bar above the table from the active tab's subs.
function updateSubBar(){
  var bar=document.getElementById('sub-bar');
  if(!bar) return;
  var tab=tabsList.find(function(t){return t.id===activeTabId;});
  var subs=((tab&&tab.subs)||[]).filter(function(s){return s.title||s.total>0||s.expire>0;});
  if(subs.length===0){ bar.style.display='none'; bar.innerHTML=''; return; }
  bar.innerHTML=subs.map(function(s){return '<span class="sb-item">'+subBarSegment(s)+'</span>';}).join('');
  bar.style.display='';
}

function renderFileList(){

    return;

  var html='';

function removeModalFile(i){

// pickModalFiles opens the native Windows file dialog through the Go-side
// binding. Files come back with their full disk paths so the server can
// re-read them on RELOAD when their content changes.
//
// Drag-and-drop was supported earlier but was removed — without access to
// the original file path (which the web platform doesn't expose for dropped
// files) RELOAD couldn't pick up edits, which made the feature confusing.
function pickModalFiles(){
  if(typeof window._goPickFiles!=='function'){
    console.warn('Native file picker is unavailable — pickModalFiles is a no-op outside the desktop shell.');
    return;
  }
  Promise.resolve(window._goPickFiles()).then(function(picked){
    if(!picked||picked.length===0) return;
    for(var i=0;i<picked.length;i++){
      var f=picked[i];
      if(!f || !f.path) continue;
      modalFiles.push({
        name: f.name||'file.txt',
        path: f.path,
        size: typeof f.size==='number'?f.size:0,
        mtime: typeof f.mtime==='number'?f.mtime:0,
        isNew: true
      });
    }
    renderFileList();
  }).catch(function(err){
    console.error('native picker failed:', err);
  });
}

// efChipHtml renders one stored value as a removable chip.
function efChipHtml(v){
  return '<span class="chip" data-v="'+x(v)+'">'+x(v)+
    '<span class="chip-x" onclick="removeEfChip(this)">x</span></span>';
}
// renderExcludeFields builds one labelled chip box per column, pre-filled
// with the values already stored on the tab. Values are added by typing and
// pressing Enter (same UX as "Custom domains without VPN"); each chip has an
// x to remove it. saveTabSettings / saveSourcesSettings read the chips back
// into "col:value" rules. Legacy bare name rules parse into the Name column.
// renderRefreshTestSel builds the "Test after auto-refresh" dropdown (off / ping
// / speed). id defaults to 'ms-refresh-test' (user tab); SOURCES passes its own.
function renderRefreshTestSel(val, id){
  id = id || 'ms-refresh-test';
  function opt(v,label){ return '<option value="'+v+'"'+(val===v?' selected':'')+'>'+x(label)+'</option>'; }
  return '<select class="modal-input num-input" id="'+id+'" style="width:auto;margin-bottom:0">'+
    opt('', t('off'))+opt('ping', t('Ping only'))+opt('speed', t('Speed test'))+
    '</select>';
}
function renderExcludeFields(rules){
  var byCol={name:[],type:[],host:[],transport:[],security:[]};
  if(rules && rules.length){
    for(var i=0;i<rules.length;i++){
      var r=parseExcludeRule(rules[i]);
      if(!r.value) continue;
      byCol[r.column].push(r.value);
    }
  }
  var html='';
  for(var k=0;k<EXCLUDE_COLS.length;k++){
    var col=EXCLUDE_COLS[k];
    var list=byCol[col];
    var label=col.charAt(0).toUpperCase()+col.slice(1);
    var chips='';
    for(var j=0;j<list.length;j++) chips+=efChipHtml(list[j]);
    html+='<div class="ef-field" data-col="'+col+'">'+
      '<div class="ef-field-tag">'+label+'</div>'+
      '<div class="chips-wrap" data-col="'+col+'">'+chips+
        '<input class="chip-input ef-chip-input" data-col="'+col+'" placeholder="'+x(EXCLUDE_PLACEHOLDERS[col])+'" onkeydown="efChipKey(event)" onpaste="efChipPaste(event)">'+
      '</div>'+
    '</div>';
  }
  return html;
}
// efChipKey turns the typed value into a chip on Enter. Modal-local only —
// nothing is persisted until the user presses Save (which reads the chips).
// efAddValue inserts one exclude-filter chip before the input (DOM-backed; the
// values are read on save by collectExcludeFilter). Dedups case-insensitively.
function efAddValue(inp, val){
  val=(val||'').trim();
  if(!val) return false;
  var wrap=inp.parentElement;
  var existing=wrap.querySelectorAll('.chip');
  for(var i=0;i<existing.length;i++){
    if((existing[i].getAttribute('data-v')||'').toLowerCase()===val.toLowerCase()) return false;
  }
  inp.insertAdjacentHTML('beforebegin', efChipHtml(val));
  return true;
}
function efChipKey(ev){
  if(ev.key!=='Enter')return;
  ev.preventDefault();
  efAddValue(ev.target, ev.target.value);
  ev.target.value='';
}
function efChipPaste(ev){
  var cd=ev.clipboardData||window.clipboardData;
  var toks=splitPasted(cd?cd.getData('text'):'');
  if(toks.length<2) return;
  ev.preventDefault();
  for(var i=0;i<toks.length;i++){ efAddValue(ev.target, toks[i]); }
  ev.target.value='';
}
function removeEfChip(el){
  var chip=el.parentElement;
  if(chip) chip.remove();
}
// collectExcludeFilter reads every chip (plus any half-typed leftover in the
// inputs) back into the stored "col:value" rule list, de-duplicated and in
// column-display order so reopening the modal is stable.
function collectExcludeFilter(){
  var ef=[];
  var seen={};
  document.querySelectorAll('#tab-filter-fields .chips-wrap').forEach(function(wrap){
    var col=wrap.getAttribute('data-col');
    var push=function(v){
      v=(v||'').trim();
      if(!v) return;
      var stored=col+':'+v;
      if(seen[stored]) return;
      seen[stored]=1;
      ef.push(stored);
    };
    wrap.querySelectorAll('.chip').forEach(function(c){ push(c.getAttribute('data-v')); });
    var inp=wrap.querySelector('.ef-chip-input');
    if(inp) push(inp.value); // don't lose a value the user forgot to Enter
  });
  return ef;
}
// urlRowHtml renders one editable source-URL row for the tab settings modal:
// an enable/disable checkbox, the input, a QR button (encodes whatever's
// currently typed), and the remove (x) button. Shared by the initial render and
// addURLRow so they stay in sync.
function urlRowHtml(val,disabled){
  return '<div class="url-row'+(disabled?' src-off':'')+'">'+
    '<input type="checkbox" class="ms-url-on" '+(disabled?'':'checked')+' onchange="toggleUrlRow(this)" title="'+t('Enable / disable this source')+'">'+
    '<input class="modal-input ms-url" value="'+x(val||'')+'" placeholder="https://raw.githubusercontent.com/...">'+
    '<button class="url-qr" onclick="qrFromRow(this)" title="'+t('QR')+'">QR</button>'+
    '<button class="url-rm" onclick="this.parentElement.remove()" title="Remove">x</button>'+
  '</div>';
}
// toggleUrlRow dims a source row when its enable checkbox is cleared.
function toggleUrlRow(cb){
  var row=cb.closest('.url-row');
  if(row) row.classList.toggle('src-off', !cb.checked);
}
// qrFromRow shows a QR of the URL currently typed in this row's input.
function qrFromRow(btn){
  var inp=btn.parentElement.querySelector('.ms-url');
  var u=inp?inp.value.trim():'';
  if(!u){ toast(t('Enter a URL first')); return; }
  showQRText(u);
}
function addURLRow(){
  var wrap=document.getElementById('ms-urls');
  if(!wrap)return;
  var div=document.createElement('div');
  div.innerHTML=urlRowHtml('',false);
  div=wrap.appendChild(div.firstChild);
  div.querySelector('.ms-url').focus();
}

// renderDedupSeg returns HTML for the 3-state dedup selector shown in
// tab settings. The currently-selected mode gets the .active class; the
// underlying value is stored as data-mode on each button so saveTabSettings
// can read it back without consulting state.
function renderDedupSeg(currentMode){
  if(!currentMode) currentMode='';
  if(currentMode==='off') currentMode=''; // be lenient about legacy values
  var modes=[
    {v:'',       l:t('Off')},
    {v:'hide',   l:t('Hide')},
    {v:'delete', l:t('Delete')}
  ];
  var html='<div class="seg-group" id="ms-dedup-seg" role="radiogroup" aria-label="'+t('Deduplicate duplicate configs')+'">';
  for(var i=0;i<modes.length;i++){
    var m=modes[i];
    var active=(currentMode===m.v)?' active':'';
    var titleText=m.v===''?t('No deduplication'):m.v==='hide'?t('Hide duplicates from view (reversible)'):t('Permanently delete duplicates');
    html+='<button type="button" class="seg-btn'+active+'" data-mode="'+m.v+'" '+
      'onclick="selectDedupMode(this)" '+
      'title="'+titleText+'">'+
      m.l+'</button>';
  }
  return html+'</div>';
}

function selectDedupMode(btn){
  var group=btn.parentElement;
  group.querySelectorAll('.seg-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}

// ghToggleFields shows/hides the GitHub import inputs as the toggle flips, so
// the fields only appear once the user opts in.
function ghToggleFields(cb){
  var f=document.getElementById('ms-gh-fields');
  if(f) f.style.display=cb.checked?'':'none';
}
// ghTogglePatView flips the PAT field between hidden (password) and visible
// (plain text). The token is masked by default; "view" reveals it, "hide"
// re-masks.
function ghTogglePatView(){
  var inp=document.getElementById('ms-gh-pat');
  var btn=document.getElementById('ms-gh-view');
  if(!inp) return;
  var show=inp.type==='password';
  inp.type=show?'text':'password';
  if(btn) btn.textContent=show?t('hide'):t('view');
}
function saveTabSettings(tabId){
  var name=document.getElementById('ms-name').value.trim();
  var refreshMin=parseInt(document.getElementById('ms-refresh').value)||0;
  var refreshOnEl=document.getElementById('ms-refresh-on');
  var excludeOnEl=document.getElementById('ms-exclude-on');
  var refreshDisabled=refreshOnEl?!refreshOnEl.checked:false;
  var excludeDisabled=excludeOnEl?!excludeOnEl.checked:false;
  // Read the active segmented-control choice. Empty data-mode means "off".
  var dedupMode='';
  var activeSeg=document.querySelector('#ms-dedup-seg .seg-btn.active');
  if(activeSeg) dedupMode=activeSeg.getAttribute('data-mode')||'';
  var urlRows=document.querySelectorAll('#ms-urls .url-row');
  var urls=[], disabledUrls=[];
  urlRows.forEach(function(row){
    var inp=row.querySelector('.ms-url');
    var v=inp?inp.value.trim():'';
    if(!v) return;
    urls.push(v);
    var cb=row.querySelector('.ms-url-on');
    if(cb && !cb.checked) disabledUrls.push(v);
  });
  // Exclude filter: chips added via Enter, read back into "col:value" rules.
  var ef=collectExcludeFilter();
  // Send only the file metadata the server needs to find and read each
  // file. Strip isNew (client-only) and size/mtime (server re-stats on
  // save anyway, so what we'd send is stale). Content is never on the
  // wire — the server reads from disk on every fetch.
  var files=modalFiles
    .filter(function(f){ return !!f.path; })
    .map(function(f){ return {name:f.name, path:f.path, disabled:!!f.disabled}; });
  // GitHub private-repo import fields.
  var ghOnEl=document.getElementById('ms-gh-on');
  var ghEnabled=ghOnEl?ghOnEl.checked:false;
  function ghVal(id){ var el=document.getElementById(id); return el?el.value.trim():''; }
  var ghOwner=ghVal('ms-gh-owner'), ghRepo=ghVal('ms-gh-repo');
  var ghFile=ghVal('ms-gh-file'), ghPat=ghVal('ms-gh-pat');
  var refreshTestEl=document.getElementById('ms-refresh-test');
  var refreshTest=refreshTestEl?refreshTestEl.value:'';
  document.getElementById('tab-modal').remove();
  modalFiles=[];
  if(name){
    fetch('/api/tab/rename?id='+encodeURIComponent(tabId)+'&name='+encodeURIComponent(name),{method:'POST'}).catch(console.error);
  }
  fetch('/api/tab/set-url?id='+encodeURIComponent(tabId),{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({urls:urls,disabled_urls:disabledUrls,files:files,refresh_min:refreshMin,exclude_filter:ef,dedup_mode:dedupMode,refresh_disabled:refreshDisabled,exclude_disabled:excludeDisabled,
      auto_refresh_test:refreshTest,
      github_enabled:ghEnabled,github_owner:ghOwner,github_repo:ghRepo,github_file:ghFile,github_pat:ghPat})
  }).then(function(){rebuildTable();}).catch(console.error);
}

// ── Row selection + delete ───────────────────────────────────────────────────
document.addEventListener('keydown',function(e){
  // Ctrl+A: select every row currently on-screen. sortedList is the
  // filter+sort result that the table actually renders, so this naturally
  // respects FILTER, TYPE pills, and the per-tab Exclude filter — copying
  // afterwards never includes hidden configs.
  if(e.ctrlKey&&(e.key==='a'||e.key==='A')){
    if(document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA'))return;
    // If the Logs panel is the active area (live selection there, or it was the
    // last thing clicked), Ctrl+A selects all the log text instead of rows.
    if(logsAreTarget()){
      var view=document.getElementById('log-view');
      if(view){
        e.preventDefault();
        e.stopPropagation();
        var r=document.createRange();
        r.selectNodeContents(view);
        var s=window.getSelection();
        s.removeAllRanges();
        s.addRange(r);
      }
      return;
    }
    e.preventDefault();
    e.stopPropagation();
    selectedRows.clear();
    sortedList.forEach(en=>selectedRows.add(en.index));
    rebuildTable();
    return;
  }
  // Ctrl+C is handled by the 'copy' event listener — see above.
  // That path is more reliable than intercepting keydown + calling
  // navigator.clipboard.writeText(), which is async, permission-gated,
  // and races with the native copy pipeline (the symptoms of which were
  // "копируется не та конфигурация" — the OS clipboard kept the
  // previous value when writeText silently failed).
  if((e.key==='Delete'||e.key==='Backspace')&&selectedRows.size>0&&activeTabId!=='main'){
    if(document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA'))return;
    e.preventDefault();
    deleteSelectedRows();
  }
  if(e.key==='Escape'){
    if(document.getElementById('tab-modal'))document.getElementById('tab-modal').remove();
    if(selectedRows.size>0){selectedRows.clear();rebuildTable();}
  }
},true);

function toggleRowSelect(idx,e){
  if(e&&e.shiftKey&&selectedRows.size>0){
    // Range select using current visual order (sortedList)
    const idxs=sortedList.map(en=>en.index);
    const lastSel=[...selectedRows].pop();
    const from=idxs.indexOf(lastSel),to=idxs.indexOf(idx);
    if(from>=0&&to>=0){
      const lo=Math.min(from,to),hi=Math.max(from,to);
      for(let i=lo;i<=hi;i++) selectedRows.add(idxs[i]);
    }
  } else if(e&&e.ctrlKey){
    if(selectedRows.has(idx)) selectedRows.delete(idx); else selectedRows.add(idx);
  } else {
    if(selectedRows.has(idx)&&selectedRows.size===1) selectedRows.clear();
    else { selectedRows.clear(); selectedRows.add(idx); }
  }
  rebuildTable();
}


// ── Ctrl+V paste handler ─────────────────────────────────────────────────────
document.addEventListener('paste', function(e){
  if(document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA'))return;
  const text=(e.clipboardData||window.clipboardData).getData('text');
  var trimmed=(text||'').trim();
  var isSub=looksLikeSubURL(trimmed);
  if(!isSub && !pasteworthy(text))return;
  if(activeTabId==='main'){
    fetch('/api/tab/create',{method:'POST'}).then(r=>r.json()).then(tab=>{
      fetch('/api/tab/switch?id='+tab.id,{method:'POST'}).then(()=>{
        if(isSub) addSubToTabSource(tab.id, trimmed);
        else fetch('/api/tab/paste?id='+tab.id,{method:'POST',body:text}).catch(console.error);
      });
    }).catch(console.error);
    return;
  }
  if(isSub){ addSubToTabSource(activeTabId, trimmed); return; }
  fetch('/api/tab/paste?id='+activeTabId,{method:'POST',body:text}).catch(console.error);
});

// Drag-and-drop file ingestion has been removed.
// Without the original disk path (which the web platform doesn't expose
// for dropped files) RELOAD couldn't pick up later edits, which made the
// feature confusing. Use the "+ add file" button in tab settings instead —
// it goes through the native Windows file dialog and yields full paths.
//
// We still need to swallow drag/drop on the document, otherwise dropping a
// file would navigate the WebView away from the app to that file.
(function(){
  document.addEventListener('dragover', function(e){
    if(e.dataTransfer && Array.prototype.indexOf.call(e.dataTransfer.types,'Files')>=0){
      e.preventDefault();
      e.dataTransfer.dropEffect='none';
    }
  });
  document.addEventListener('drop', function(e){
    if(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length>0){
      e.preventDefault();
    }
  });
})();

// ── Custom title bar (standalone frameless mode) ─────────────────────────────
(function(){
  if(typeof _goWinClose !== 'function') return;

  const titlebar = document.getElementById('titlebar');
  const btnMax   = document.getElementById('tb-max');
  titlebar.classList.add('active');

  // Load logo from Go binding
  if(typeof _goLogoBase64 === 'function'){
    _goLogoBase64().then(b64=>{
      if(b64) document.getElementById('tb-logo-img').src='data:image/png;base64,'+b64;
    }).catch(()=>{});
  }

  const svgMax     = '<svg width="9" height="9" viewBox="0 0 9 9"><rect x="0.5" y="0.5" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1"/></svg>';
  const svgRestore = '<svg width="11" height="11" viewBox="0 0 11 11"><rect x="2.5" y="0.5" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1"/><rect x="0.5" y="2.5" width="8" height="8" fill="var(--bg)" stroke="currentColor" stroke-width="1"/></svg>';

  function syncMaxIcon(){
    _goWinIsMaximized().then(v=>{
      btnMax.innerHTML = v ? svgRestore : svgMax;
      btnMax.title = v ? 'Restore' : 'Maximize';
    }).catch(()=>{});
  }
  syncMaxIcon();
  window.addEventListener('resize', syncMaxIcon);

  document.getElementById('tb-close').addEventListener('click', ()=>_goWinClose());
  document.getElementById('tb-min').addEventListener('click',   ()=>_goWinMinimize());
  btnMax.addEventListener('click', ()=>_goWinMaximize().then(syncMaxIcon));

  document.getElementById('tb-drag').addEventListener('mousedown', e=>{
    if(e.button===0 && !e.target.closest('.tb-btns')) _goWinDragStart();
  });
  document.getElementById('tb-drag').addEventListener('dblclick', e=>{
    if(!e.target.closest('.tb-btns')) _goWinMaximize().then(syncMaxIcon);
  });
})();

// Restore the persisted type-filter selection and reflect it in the pills.
// Runs at end-of-script so PROTO_PILLS / renderProtoPills are defined (no
// temporal-dead-zone) and the proto-* buttons exist in the DOM. The table
// is (re)built from SSE-driven loads, which call matches() → protoFilter,
// so no explicit rebuildTable() is needed here.
loadProtoFilter();
renderProtoPills();

</script>
